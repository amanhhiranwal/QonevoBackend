{{template "header" .}}

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <h1>Qonevo</h1>
            <p>Sign in to your account</p>
        </div>

        <form
            class="auth-form"
            method="POST"
            action="/login-post"
        >

            <div class="form-group">
                <label class="form-label">
                    Email
                </label>

                <input
                    class="form-input"
                    type="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label">
                    Password
                </label>

                <input
                    class="form-input"
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <button
                class="auth-btn"
                type="submit"
            >
                Sign In
            </button>

        </form>

        <div class="auth-footer">
            Don’t have an account? Contact Admin.
            <!-- <a href="/register">
                Create account
            </a> -->
        </div>

    </div>

</div>

{{template "footer" .}}
